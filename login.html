<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | NEXT AI LAB</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:3rem 2.5rem;
      max-width:440px; width:100%; text-align:center;
    }
    .logo { font-size:2.5rem; margin-bottom:1.25rem; }
    h1 { font-size:1.5rem; font-weight:700; margin-bottom:.5rem; }
    .sub { color:var(--text-secondary); font-size:.9rem; margin-bottom:2rem; line-height:1.7; }
    .step { display:none; flex-direction:column; gap:.875rem; }
    .step.active { display:flex; }
    input {
      background:var(--bg); border:1px solid var(--border); color:var(--text);
      padding:.875rem 1rem; border-radius:8px; font-size:1rem;
      width:100%; box-sizing:border-box; transition:border-color .2s;
      text-align:center; letter-spacing:.05em;
    }
    input:focus { outline:none; border-color:var(--accent); }
    button {
      background:var(--accent); color:#fff; border:none;
      padding:.875rem; border-radius:8px; font-size:1rem;
      font-weight:600; cursor:pointer; transition:opacity .2s;
    }
    button:hover:not(:disabled) { opacity:.85; }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .msg {
      margin-top:1rem; padding:.875rem 1rem; border-radius:8px;
      font-size:.875rem; display:none; line-height:1.5;
    }
    .msg.ok  { background:rgba(16,185,129,.12); border:1px solid rgba(16,185,129,.35); color:#10b981; }
    .msg.err { background:rgba(239,68,68,.12);  border:1px solid rgba(239,68,68,.35);  color:#ef4444; }
    .back { background:none; border:none; color:var(--text-secondary); font-size:.85rem;
            cursor:pointer; padding:.25rem; text-decoration:underline; margin-top:.25rem; }
    .hint { margin-top:2rem; font-size:.78rem; color:var(--text-secondary); line-height:1.6; }
    .hint a { color:var(--accent); }
    .privacy { margin-top:1.5rem; border-top:1px solid var(--border); padding-top:1rem; text-align:center; }
    .privacy-link { font-size:.78rem; color:var(--text-secondary); text-decoration:none; }
    .privacy-link:hover { color:var(--accent); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🎓</div>
  <h1>NEXT AI LAB</h1>
  <p class="sub" id="subText">メールアドレスを入力してください</p>

  <!-- STEP 1: メール入力 -->
  <div class="step active" id="step1">
    <input type="email" id="emailInput" placeholder="your@gmail.com" autocomplete="email">
    <button id="sendBtn">コードを送る</button>
  </div>

  <!-- STEP 2: コード入力 -->
  <div class="step" id="step2">
    <input type="text" id="otpInput" placeholder="6桁のコード" inputmode="numeric"
           maxlength="6" autocomplete="one-time-code">
    <button id="verifyBtn">ログイン</button>
    <button class="back" id="backBtn">← メールアドレスを変更する</button>
  </div>

  <div class="msg" id="msg"></div>

  <div class="privacy">
    <a href="/privacy" target="_blank" class="privacy-link">メールアドレスの取り扱い・プライバシーポリシー</a>
  </div>
</div>

<script>
  let pendingToken = '';

  const step1 = document.getElementById('step1');
  const step2 = document.getElementById('step2');
  const subText = document.getElementById('subText');
  const emailInput = document.getElementById('emailInput');
  const otpInput   = document.getElementById('otpInput');
  const sendBtn    = document.getElementById('sendBtn');
  const verifyBtn  = document.getElementById('verifyBtn');
  const backBtn    = document.getElementById('backBtn');
  const msg        = document.getElementById('msg');

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'msg ' + type;
    msg.style.display = 'block';
  }

  // STEP 1: コード送信
  sendBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    if (!email) return;

    sendBtn.disabled = true;
    sendBtn.textContent = '送信中…';
    msg.style.display = 'none';

    try {
      const res  = await fetch('/api/send-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();

      if (data.success) {
        pendingToken = data.pendingToken;
        step1.classList.remove('active');
        step2.classList.add('active');
        subText.textContent = `${email} にコードを送りました`;
        otpInput.focus();
      } else {
        showMsg(data.error || 'エラーが発生しました', 'err');
        sendBtn.disabled = false;
        sendBtn.textContent = 'コードを送る';
      }
    } catch {
      showMsg('ネットワークエラーが発生しました', 'err');
      sendBtn.disabled = false;
      sendBtn.textContent = 'コードを送る';
    }
  });

  // STEP 2: OTP検証
  verifyBtn.addEventListener('click', async () => {
    const otp = otpInput.value.trim();
    if (!otp) return;

    verifyBtn.disabled = true;
    verifyBtn.textContent = '確認中…';
    msg.style.display = 'none';

    try {
      const res  = await fetch('/api/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pendingToken, otp }),
      });
      const data = await res.json();

      if (data.success) {
        showMsg('ログイン成功！ページを移動します…', 'ok');
        setTimeout(() => { window.location.href = '/'; }, 800);
      } else {
        showMsg(data.error || 'コードが正しくありません', 'err');
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'ログイン';
      }
    } catch {
      showMsg('ネットワークエラーが発生しました', 'err');
      verifyBtn.disabled = false;
      verifyBtn.textContent = 'ログイン';
    }
  });

  // 戻るボタン
  backBtn.addEventListener('click', () => {
    step2.classList.remove('active');
    step1.classList.add('active');
    subText.textContent = 'メールアドレスを入力してください';
    sendBtn.disabled = false;
    sendBtn.textContent = 'コードを送る';
    msg.style.display = 'none';
    otpInput.value = '';
  });

  // Enterキー対応
  emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendBtn.click(); });
  otpInput.addEventListener('keydown',   e => { if (e.key === 'Enter') verifyBtn.click(); });

</script>
</body>
</html>
